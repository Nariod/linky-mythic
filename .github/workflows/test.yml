name: Automated Tests

on: [push, pull_request]

jobs:
  rust-tests:
    name: Rust unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust unit tests
        working-directory: Payload_Type/linky/agent_code
        env:
          CALLBACK: x
          IMPLANT_SECRET: x
          PAYLOAD_UUID: x
          CALLBACK_URI: /
        run: cargo test --workspace

  go-build:
    name: Go build check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download Go modules
        working-directory: Payload_Type/linky
        run: go mod download

      - name: Build Go payload type
        working-directory: Payload_Type/linky
        run: go build ./...

      - name: Run go vet
        working-directory: Payload_Type/linky
        run: go vet ./...
