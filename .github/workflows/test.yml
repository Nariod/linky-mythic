name: Automated Tests

on: [push, pull_request]

jobs:
  rust-tests:
    name: Rust unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: Payload_Type/linky/agent_code
        run: cargo fmt --check --all

      - name: Run Rust unit tests
        working-directory: Payload_Type/linky/agent_code
        env:
          CALLBACK: x
          IMPLANT_SECRET: x
          PAYLOAD_UUID: x
          CALLBACK_URI: /
        run: cargo test --workspace

  rust-cross-check:
    name: Cross-compile check (${{ matrix.target }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-pc-windows-gnu
          - x86_64-apple-darwin
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile dependencies
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cargo check for ${{ matrix.target }}
        working-directory: Payload_Type/linky/agent_code
        env:
          CALLBACK: x
          IMPLANT_SECRET: x
          PAYLOAD_UUID: x
          CALLBACK_URI: /
        run: cargo check --target ${{ matrix.target }}

  go-build:
    name: Go build check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download Go modules
        working-directory: Payload_Type/linky
        run: go mod download

      - name: Build Go payload type
        working-directory: Payload_Type/linky
        run: go build ./...

      - name: Run go vet
        working-directory: Payload_Type/linky
        run: go vet ./...
